version: 2

project_name: tend

builds:
  - id: tend
    main: ./cmd/tend
    binary: tend
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/jwstover/tend/internal/version.version=v{{ .Version }}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  disable: true # release-please owns CHANGELOG.md and release notes

release:
  mode: keep-existing # attach assets to the release release-please created
